name: Manual Test Build

on:
  workflow_dispatch:

jobs:
  test-build:
    name: Test Build Process
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Framework
      uses: microsoft/setup-msbuild@v1.3

    - name: Setup NuGet
      uses: nuget/setup-nuget@v1
      with:
        nuget-version: 'latest'

    - name: Restore NuGet packages
      run: nuget restore Gcode.sln

    - name: Build solution (Debug)
      run: msbuild Gcode.sln /p:Configuration=Debug /p:Platform="Any CPU"

    - name: Build solution (Release)  
      run: msbuild Gcode.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: List build outputs
      run: |
        Write-Host "=== Gcodes Library Debug Output ==="
        if (Test-Path "Gcodes\bin\Debug") { Get-ChildItem "Gcodes\bin\Debug" -Recurse }
        Write-Host "=== Gcodes Library Release Output ==="
        if (Test-Path "Gcodes\bin\Release") { Get-ChildItem "Gcodes\bin\Release" -Recurse }
        Write-Host "=== Gcodes.Console Debug Output ==="
        if (Test-Path "Gcodes.Console\bin\Debug") { Get-ChildItem "Gcodes.Console\bin\Debug" -Recurse }
        Write-Host "=== Gcodes.Console Release Output ==="
        if (Test-Path "Gcodes.Console\bin\Release") { Get-ChildItem "Gcodes.Console\bin\Release" -Recurse }
        Write-Host "=== Gcodes.Test Debug Output ==="
        if (Test-Path "Gcodes.Test\bin\Debug") { Get-ChildItem "Gcodes.Test\bin\Debug" -Recurse }
        Write-Host "=== Gcodes.Test Release Output ==="
        if (Test-Path "Gcodes.Test\bin\Release") { Get-ChildItem "Gcodes.Test\bin\Release" -Recurse }
      shell: pwsh

    - name: Setup VSTest
      uses: darenm/Setup-VSTest@v1.2

    - name: Run tests
      run: vstest.console.exe "Gcodes.Test\bin\Debug\Gcodes.Test.dll" /logger:console
      continue-on-error: true